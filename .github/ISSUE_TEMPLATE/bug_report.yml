name: Bug Report
description: Report a bug in @zappzarapp/browser-utils
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

        **Security vulnerabilities** should be reported privately via
        [GitHub Security Advisories](https://github.com/marcstraube/zappzarapp-browser-utils/security/advisories/new)
        or email (see [SECURITY.md](https://github.com/marcstraube/zappzarapp-browser-utils/blob/master/SECURITY.md)).

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      placeholder: "e.g. storage, cookie, events, keyboard, network, scroll, form, html, observe"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Library Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: "e.g. Chrome 120, Firefox 121, Safari 17"
    validations:
      required: true
